# This is a Databricks asset bundle definition for dab_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dab_project
  uuid: 01ac0eba-5f70-4da8-8b60-0200574f494b

include:
  - resources/*.yml
  - resources/*/*.yml

sync:
  exclude:
    - .venv_dbc/**
    - __pycache__/**
    - .vscode/**
    - "*.pyc"

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    default: "citibike_dev"

  dev_flag:
    description: Flag for dev environment
    default: true

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-3697574787118981.1.azuredatabricks.net
      
  
    presets:
      artifacts_dynamic_version: true

  test:
    mode: production
    workspace:
      host: https://adb-7405616190047052.12.azuredatabricks.net/
      # We explicitly deploy to /Workspace/Users/sam7645shah_gmail.com#ext#@sam7645shahgmail.onmicrosoft.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog:
        default: "citibike_test"
      dev_flag:
        default: false
      
    permissions:
      - service_principal_name: db8f4004-b91f-4cb2-a532-f857c29f0eb6
        level: CAN_MANAGE
    run_as:
      service_principal_name: db8f4004-b91f-4cb2-a532-f857c29f0eb6

  prod:
    mode: production
    workspace:
      host: https://adb-7405608822547512.12.azuredatabricks.net/
      # We explicitly deploy to /Workspace/Users/sam7645shah_gmail.com#ext#@sam7645shahgmail.onmicrosoft.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog:
        default: "citibike_prod"
      dev_flag:
        default: false
      
    permissions:
      - service_principal_name: eee9a86a-955e-4378-adfd-7cc7f1901f11
        level: CAN_MANAGE
    run_as:
      service_principal_name: eee9a86a-955e-4378-adfd-7cc7f1901f11
